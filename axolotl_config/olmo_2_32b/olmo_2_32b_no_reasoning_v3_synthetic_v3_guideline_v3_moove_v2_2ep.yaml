wandb_name: olmo_2_32b_no_reasoning_v3_synthetic_v3_guideline_v3_moove_v2_2ep
output_dir: /capstor/scratch/cscs/theimer/meditron/xav/olmo_2_32b_no_reasoning_v3_synthetic_v3_guideline_v3_moove_v2_2ep
dataset_prepared_path: /capstor/scratch/cscs/theimer/prepared/olmo_2_32b_no_reasoning_v3_synthetic_v3_guideline_v3_moove_v2_2ep

base_model: allenai/OLMo-2-0325-32B-SFT


plugins:
  - axolotl.integrations.cut_cross_entropy.CutCrossEntropyPlugin

load_in_8bit: false
load_in_4bit: false

datasets:
  - path: /users/theimer/meditron-4/data/curated_qa/curated_qa.jsonl
    ds_type: json
    type: chat_template
    field_messages: conversations
    message_property_mappings:
      role: from
      content: value
    roles:
      system: [system]
      user: [user, human]
      assistant: [assistant, gpt]

  - path: /users/theimer/meditron-4/data/synthetic_qa/synthetic_curated_qa.jsonl
    ds_type: json
    type: chat_template
    field_messages: conversations
    message_property_mappings:
      role: from
      content: value
    roles:
      system: [system]
      user: [user, human]
      assistant: [assistant, gpt]

  - path: /users/theimer/meditron-4/data/guidelines_qa/guidelines_qa.jsonl
    ds_type: json
    type: chat_template
    field_messages: conversations
    message_property_mappings:
      role: from
      content: value
    roles:
      system: [system]
      user: [user, human]
      assistant: [assistant, gpt]

  - path:  /users/theimer/meditron-4/data/synthetic_moove/synthetic_moove.jsonl
    ds_type: json
    type: chat_template
    field_messages: conversations
    message_property_mappings:
      role: from
      content: value
    roles:
      system: [system]
      user: [user, human]
      assistant: [assistant, gpt]

      
val_set_size: 0.0


sequence_len: 4096
sample_packing: true


gradient_accumulation_steps: 8
micro_batch_size: 1
num_epochs: 2
optimizer: adamw_torch_fused
lr_scheduler: cosine
learning_rate: 5e-6
max_grad_norm: 1.0
weight_decay: 0.0

bf16: true
tf32: false

logging_steps: 1
flash_attention: true

warmup_ratio: 0.03
evals_per_epoch: 0
saves_per_epoch: 0
wandb_project: $WANDB_PROJECT
wandb_entity: $WANDB_ENTITY

fsdp_version: 2
fsdp_config:
  offload_params: false
  cpu_ram_efficient_loading: true
  auto_wrap_policy: TRANSFORMER_BASED_WRAP
  transformer_layer_cls_to_wrap: Olmo2DecoderLayer
  state_dict_type: SHARDED_STATE_DICT
  reshard_after_forward: true
  activation_checkpointing: true

seed: 42
data_seed: 42